<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <!-- Antenna left -->
  <line x1="72" y1="28" x2="60" y2="8" stroke="#3a4f5c" stroke-width="5" stroke-linecap="round"/>
  <circle cx="60" cy="7" r="6" fill="#3a4f5c"/>
  <!-- Antenna right -->
  <line x1="128" y1="28" x2="140" y2="8" stroke="#3a4f5c" stroke-width="5" stroke-linecap="round"/>
  <circle cx="140" cy="7" r="6" fill="#3a4f5c"/>

  <!-- Basket body -->
  <rect x="30" y="65" width="140" height="90" rx="16" fill="white" stroke="#3a4f5c" stroke-width="5"/>

  <!-- Basket handle / rim top -->
  <rect x="22" y="95" width="156" height="22" rx="11" fill="white" stroke="#3a4f5c" stroke-width="4.5"/>

  <!-- Basket grid squares (left side) -->
  <rect x="40" y="120" width="13" height="10" rx="2" fill="#6dbfa8" opacity="0.7"/>
  <rect x="40" y="134" width="13" height="10" rx="2" fill="#6dbfa8" opacity="0.7"/>
  <!-- Basket grid squares (right side) -->
  <rect x="147" y="120" width="13" height="10" rx="2" fill="#6dbfa8" opacity="0.7"/>
  <rect x="147" y="134" width="13" height="10" rx="2" fill="#6dbfa8" opacity="0.7"/>

  <!-- Items in basket -->
  <!-- Bottle left -->
  <rect x="58" y="52" width="22" height="42" rx="5" fill="#3cb87a" opacity="0.75"/>
  <rect x="63" y="46" width="12" height="10" rx="3" fill="#3cb87a" opacity="0.75"/>
  <!-- Bottle middle -->
  <rect x="88" y="57" width="20" height="37" rx="5" fill="#3cb87a" opacity="0.55"/>
  <rect x="93" y="51" width="10" height="10" rx="3" fill="#3cb87a" opacity="0.55"/>
  <!-- Box right -->
  <rect x="115" y="55" width="26" height="20" rx="4" fill="#3cb87a" opacity="0.85"/>
  <rect x="115" y="78" width="26" height="16" rx="4" fill="#3cb87a" opacity="0.65"/>

  <!-- Face: eyes -->
  <circle cx="82" cy="130" r="7" fill="#3a4f5c"/>
  <circle cx="118" cy="130" r="7" fill="#3a4f5c"/>
  <!-- Face: smile -->
  <path d="M82 148 Q100 164 118 148" stroke="#3a4f5c" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- PantryPal text -->
  <text x="100" y="196" font-family="'Trebuchet MS', Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle" fill="#3cb87a" letter-spacing="-0.5">PantryPal</text>
</svg>
